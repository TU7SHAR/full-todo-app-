{% extends 'base.html' %} {% block body %}
<div class="content">
  <h1 style="text-align: center">Update Diary</h1>
</div>

<div class="form-container">
  <form
    action="{{ url_for('tasks.update', id=task.id) }}"
    method="POST"
    class="task-form"
  >
    <input
      type="text"
      name="content"
      id="content"
      value="{{task.content}}"
      required
    />
    <input type="submit" value="UPDATE TASK" />
  </form>
</div>
{% endblock %}
